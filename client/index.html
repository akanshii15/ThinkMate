  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const umamiEndpoint = "%VITE_ANALYTICS_ENDPOINT%";
      const umamiWebsiteId = "%VITE_ANALYTICS_WEBSITE_ID%";

      if (
        umamiEndpoint &&
        umamiWebsiteId &&
        umamiEndpoint !== "%VITE_ANALYTICS_ENDPOINT%" &&
        umamiWebsiteId !== "%VITE_ANALYTICS_WEBSITE_ID%"
      ) {
        const script = document.createElement("script");
        script.defer = true;
        script.src = `${umamiEndpoint.replace(/\/$/, "")}/umami`;
        script.dataset.websiteId = umamiWebsiteId;
        document.head.appendChild(script);
      }
    </script>
